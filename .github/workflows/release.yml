name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3). Leave empty to auto-bump patch.'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-manual-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Check admin permission
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          permission=$(gh api repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission --jq '.permission')
          if [ "$permission" != "admin" ]; then
            echo "Only admins can trigger manual releases"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> $GITHUB_OUTPUT
          else
            current=$(jq -r '.["synapses/sdk"]' .release-please-manifest.json)
            IFS='.' read -r major minor patch <<< "$current"
            patch=$((patch + 1))
            echo "version=${major}.${minor}.${patch}" >> $GITHUB_OUTPUT
          fi

      - name: Push release commit
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: release $RELEASE_VERSION" -m "Release-As: $RELEASE_VERSION"
          git push

  release-please:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish
        run: pnpm --filter @neurome/sdk publish --access public --no-git-checks --provenance
