name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - uses: actions/checkout@v4
        if: steps.release.outputs.pr != ''
        with:
          ref: ${{ steps.release.outputs.pr != '' && fromJson(steps.release.outputs.pr).headBranchName || '' }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - uses: pnpm/action-setup@v4
        if: steps.release.outputs.pr != ''
        with:
          version: 10.11.0

      - name: Format CHANGELOG
        if: steps.release.outputs.pr != ''
        run: |
          pnpm exec prettier --write synapses/sdk/CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add synapses/sdk/CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore: format CHANGELOG.md"
          git push

  publish:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish
        run: pnpm --filter @neurome/sdk publish --access public --no-git-checks --provenance
