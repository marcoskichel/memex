name: Feature request
description: Propose a new feature or enhancement
title: 'feat: '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem this solves
      description: What problem or limitation does this address?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: true
  - type: checkboxes
    id: validations
    attributes:
      label: Before submitting
      options:
        - label: I searched for existing feature requests
          required: true
